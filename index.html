<div class="card-news-container">
  <div class="image-wrapper">
    <img id="card-image" src="https://github.com/anguk-staion/playday/raw/main/WP.01_00.jpg" alt="카드뉴스 이미지">
  </div>
  
  <button id="prev-btn" class="nav-btn left-btn" onclick="prevImage()">&#10094;</button>
  <button id="next-btn" class="nav-btn right-btn" onclick="nextImage()">&#10095;</button>
</div>

<style>
  :root {
    /* 💡 여기서 전체 너비를 조절할 수 있습니다 */
    --card-max-width: 800px;      /* 카드뉴스 전체의 최대 가로 너비 (예: 600px, 800px, 100%) */
    
    /* 💡 여기서 이미지 컨테이너의 비율을 조절할 수 있습니다. 
       원본 이미지가 이 비율과 다를 경우, 이미지는 원본 비율을 유지하며 
       컨테이너 내부에 맞춰지고 여백은 배경색으로 채워집니다. */
    --card-aspect-ratio: 1 / 1;   /* 가로/세로 비율 (예: 1/1 (정방형), 4/3, 16/9, 원본 이미지 비율과 비슷하게 설정 권장) */
  }

  .card-news-container {
    position: relative;
    width: 100%;
    max-width: var(--card-max-width);
    margin: 0 auto;
    overflow: hidden;
    border-radius: 8px; /* 테두리 둥글게 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* 부드러운 그림자 효과 */
    background-color: #ffffff; /* 컨테이너 배경색 (여백 색상) */
  }

  .image-wrapper {
    width: 100%;
    aspect-ratio: var(--card-aspect-ratio);
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f7f7f7; /* 이미지 로딩 전/여백 배경색 */
  }

  #card-image {
    width: 100%;
    height: 100%;
    /* ⭐️ 핵심: 원본 이미지 비율을 유지하면서 컨테이너 내부에 꽉 차게 맞춤. 남는 공간은 배경색으로 채워짐. */
    object-fit: contain; 
    transition: opacity 0.3s ease-in-out; /* 부드러운 이미지 전환 효과 */
  }

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0, 0, 0, 0.4);
    color: white;
    border: none;
    width: 44px; /* 버튼 크기 확대 */
    height: 44px;
    cursor: pointer;
    font-size: 20px;
    border-radius: 50%;
    transition: background-color 0.2s ease, opacity 0.2s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10; /* 버튼이 이미지 위에 오도록 설정 */
    opacity: 0.8;
  }

  .nav-btn:hover {
    background-color: rgba(0, 0, 0, 0.8);
    opacity: 1;
  }

  .left-btn { left: 20px; }
  .right-btn { right: 20px; }

  /* 첫 페이지에서 이전 버튼 숨기기용 클래스 */
  .hidden { display: none !important; }
</style>

<script>
  // GitHub raw 이미지 링크 배열
  const images = [
    "https://github.com/anguk-staion/playday/raw/main/WP.01_00.jpg",
    "https://github.com/anguk-staion/playday/raw/main/WP.01_01.jpg",
    "https://github.com/anguk-staion/playday/raw/main/WP.01_02.jpg",
    "https://github.com/anguk-staion/playday/raw/main/WP.01_03.jpg",
    "https://github.com/anguk-staion/playday/raw/main/WP.01_04.jpg",
    "https://github.com/anguk-staion/playday/raw/main/WP.01_05.jpg",
    "https://github.com/anguk-staion/playday/raw/main/WP.01_06.jpg"
  ];

  let currentIndex = 0;
  const imgElement = document.getElementById("card-image");
  const prevBtn = document.getElementById("prev-btn");

  function updateView() {
    imgElement.style.opacity = 0; // 이미지 전환 전 투명하게
    
    // 이미지 소스 업데이트 후, 로드가 완료되면 다시 보이게 함 (부드러운 전환)
    imgElement.onload = function() {
      imgElement.style.opacity = 1;
    };
    imgElement.src = images[currentIndex];
    
    // 조건 1: 첫번째 장(index 0)에서는 왼쪽 버튼 숨김
    if (currentIndex === 0) {
      prevBtn.classList.add("hidden");
    } else {
      prevBtn.classList.remove("hidden");
    }
  }

  function nextImage() {
    if (currentIndex === images.length - 1) {
      // 조건 2: 마지막 장에서 오른쪽 누르면 처음(0)으로 무한루프
      currentIndex = 0;
    } else {
      currentIndex++;
    }
    updateView();
  }

  function prevImage() {
    if (currentIndex > 0) {
      currentIndex--;
      updateView();
    }
  }

  // 로드 시 초기 화면 렌더링
  updateView();
</script>
