<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카드뉴스</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      background: #f3f5f8;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #111827;
    }

    /* 💡 크기 강제 적용 영역 */
    .card-news {
      width: 100% !important;
      max-width: 530px !important; /* ⬅️ 이 숫자를 조절하여 원하는 크기로 맞추세요 */
      margin: 0 auto !important;
      position: relative;
    }

    .carousel {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: #ffffff;
      box-shadow:
        0 12px 30px rgba(15, 23, 42, 0.12),
        0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .carousel__viewport {
      overflow: hidden;
      width: 100%;
    }

    .carousel__track {
      display: flex;
      align-items: flex-start;
      /* 부드러운 화면 전환을 위한 트랜지션 설정 */
      transition: transform 0.4s ease-in-out;
      will-change: transform;
    }

    .slide {
      position: relative;
      flex: 0 0 100%;
      background: #fff;
    }

    /* 원본 비율 유지 */
    .slide img {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
      object-fit: contain;
    }

    .page-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.72);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      backdrop-filter: blur(6px);
    }

    /* 좌우 네비게이션 버튼 공통 스타일 */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 50%;
      background: rgba(17, 24, 39, 0.72);
      color: #fff;
      cursor: pointer;
      z-index: 10;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(6px);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(17, 24, 39, 0.88);
    }

    .nav-btn.prev {
      left: 14px;
    }

    .nav-btn.next {
      right: 14px;
    }

    /* 하단 인디케이터 (Dots) */
    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px 0 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #cbd5e1;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .dot.active {
      width: 24px;
      background: #111827;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 10px;
      }
      .nav-btn {
        width: 46px;
        height: 46px;
      }
      .page-badge {
        top: 10px;
        right: 10px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <section class="card-news">
    <div class="carousel">
      <div class="carousel__viewport">
        <div class="carousel__track" id="carouselTrack">
          <article class="slide">
            <span class="page-badge">1 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_00.jpg" alt="카드뉴스 1" />
          </article>

          <article class="slide">
            <span class="page-badge">2 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_01.jpg" alt="카드뉴스 2" />
          </article>

          <article class="slide">
            <span class="page-badge">3 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_02.jpg" alt="카드뉴스 3" />
          </article>

          <article class="slide">
            <span class="page-badge">4 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_03.jpg" alt="카드뉴스 4" />
          </article>

          <article class="slide">
            <span class="page-badge">5 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_04.jpg" alt="카드뉴스 5" />
          </article>

          <article class="slide">
            <span class="page-badge">6 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_05.jpg" alt="카드뉴스 6" />
          </article>

          <article class="slide">
            <span class="page-badge">7 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_06.jpg" alt="카드뉴스 7" />
          </article>

          <article class="slide" aria-hidden="true">
            <span class="page-badge">1 / 7</span>
            <img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_00.jpg" alt="" />
          </article>
        </div>
      </div>

      <button class="nav-btn prev" id="prevBtn" aria-label="이전 슬라이드" style="display: none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      
      <button class="nav-btn next" id="nextBtn" aria-label="다음 슬라이드">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="dots" id="dotContainer">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </section>

  <script>
    const track = document.getElementById('carouselTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dots = document.querySelectorAll('.dot');
    
    let currentIndex = 0;
    const totalOriginalSlides = 7; // 실제 이미지 개수

    // 슬라이드와 UI(버튼, 하단 점) 상태를 업데이트하는 함수
    function updateSlider() {
      // 0.4초 동안 부드럽게 이동
      track.style.transition = 'transform 0.4s ease-in-out';
      track.style.transform = `translateX(-${currentIndex * 100}%)`;
      
      // 첫 번째 장에서는 왼쪽 버튼을 숨김
      if (currentIndex === 0) {
        prevBtn.style.display = 'none';
      } else {
        prevBtn.style.display = 'grid'; 
      }

      // 하단 Dot 활성화 디자인 변경
      const activeIndex = currentIndex === totalOriginalSlides ? 0 : currentIndex;
      dots.forEach((dot, index) => {
        if (index === activeIndex) {
          dot.classList.add('active');
        } else {
          dot.classList.remove('active');
        }
      });
    }

    // 오른쪽(다음) 버튼 클릭 시
    nextBtn.addEventListener('click', () => {
      if (currentIndex >= totalOriginalSlides) return; // 중복 클릭 방지
      
      currentIndex++;
      updateSlider();
      
      // 마지막 장에서 오른쪽으로 넘겨 복제본에 도달했을 때 무한 루프 트릭 실행
      if (currentIndex === totalOriginalSlides) {
        setTimeout(() => {
          // 화면 전환 애니메이션(0.4초)이 끝난 직후 전환 효과를 끄고 진짜 1번 자리로 몰래 이동
          track.style.transition = 'none'; 
          currentIndex = 0;
          track.style.transform = `translateX(0)`;
          prevBtn.style.display = 'none'; // 첫 장이므로 왼쪽 버튼 다시 숨김
        }, 400); 
      }
    });

    // 왼쪽(이전) 버튼 클릭 시
    prevBtn.addEventListener('click', () => {
      if (currentIndex <= 0) return;
      currentIndex--;
      updateSlider();
    });

    // 하단의 점(Dot)을 클릭해서 슬라이드를 이동
    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        // 루프 복귀 애니메이션 도중에는 오작동 방지를 위해 클릭 무시
        if (currentIndex === totalOriginalSlides) return; 
        
        currentIndex = index;
        updateSlider();
      });
    });
  </script>
</body>
</html>
