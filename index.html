<style>
  /* 1. 슬라이더 전체 영역 설정 */
  .card-news-container {
    max-width: 600px; /* [크기조절] 전체 가로 너비 */
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background-color: #f4f4f4; /* 이미지 여백이 생길 경우 보일 배경색 */
    
    /* --- [비율 옵션 설정 1: 컨테이너] --- */
    /* 현재: 원본 비율 모드 (아래 aspect-ratio가 꺼져있음) */
    /* 고정 비율(예: 1/1 정사각형)로 꽉 채우고 싶다면 아래 주석(/* */)을 지워주세요. */
    /* aspect-ratio: 1 / 1; */ 
  }

  .slider-track {
    display: flex;
    width: 100%;
    /* 초기 위치는 첫 번째 장(이미지 0번) */
    transform: translateX(-100%); 
    align-items: center; /* 이미지가 세로 중심에 오도록 정렬 */
  }

  .slide {
    min-width: 100%;
    display: flex;
    justify-content: center;
  }

  .slide img {
    width: 100%;
    display: block;

    /* --- [비율 옵션 설정 2: 이미지] --- */
    /* 현재: 원본 비율 유지 모드 */
    height: auto; 
    object-fit: contain; /* 이미지가 잘리지 않고 전체가 다 보이게 함 */

    /* 고정 비율(정사각형 등)에 맞춰 남는 부분 없이 꽉 채우고 싶다면 
       위 두 줄을 지우고 아래 두 줄의 주석을 해제하세요. */
    /* height: 100%; */
    /* object-fit: cover; */
  }

  /* 좌우 화살표 디자인 (동그라미) */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0, 0, 0, 0.4);
    color: white;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
  }

  .nav-btn:hover {
    background-color: rgba(0, 0, 0, 0.8);
  }

  .prev-btn { left: 15px; }
  .next-btn { right: 15px; }
</style>

<div class="card-news-container">
  <div class="slider-track" id="sliderTrack">
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_06.jpg"></div>
    
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_00.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_01.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_02.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_03.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_04.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_05.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_06.jpg"></div>

    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_00.jpg"></div>
  </div>

  <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
  <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
</div>

<script>
  const track = document.getElementById('sliderTrack');
  const slides = document.querySelectorAll('.slide');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let index = 1; // 0번 이미지(첫 장)가 처음에 보이도록 설정
  let isMoving = false;

  // 화살표 표시/숨김을 제어하는 함수
  function updateButtons() {
    if (index === 1 || index === slides.length - 1) {
      prevBtn.style.display = 'none'; // 첫 장에서 왼쪽 화살표 숨김
    } else {
      prevBtn.style.display = 'flex'; // 나머지 장에서 왼쪽 화살표 표시
    }
  }

  // 초기 상태 업데이트
  updateButtons();

  function moveSlider() {
    track.style.transition = 'transform 0.4s ease-in-out';
    track.style.transform = `translateX(-${index * 100}%)`;
    updateButtons(); 
  }

  // 슬라이드 애니메이션이 끝났을 때의 처리 (무한 루프)
  track.addEventListener('transitionend', () => {
    isMoving = false;
    
    // 가짜 0번(가장 오른쪽)에 도달하면 애니메이션 없이 진짜 0번 위치로 점프
    if (slides[index].innerHTML.includes('WP.01_00.jpg') && index === slides.length - 1) {
      track.style.transition = 'none';
      index = 1;
      track.style.transform = `translateX(-${index * 100}%)`;
    }
  });

  nextBtn.addEventListener('click', () => {
    if (isMoving) return;
    isMoving = true;
    index++;
    moveSlider();
  });

  prevBtn.addEventListener('click', () => {
    if (isMoving) return;
    isMoving = true;
    index--;
    moveSlider();
  });
</script>
