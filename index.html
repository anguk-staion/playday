<style>
  /* 1. 이미지 비율 및 크기 조절 섹션 */
  .card-news-container {
    max-width: 800px; /* [크기조절] 전체 가로 너비 */
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background-color: #f4f4f4;
    
    /* [비율조절] 
       aspect-ratio를 수정하여 전체 비율을 고정하세요.
       예: 1 / 1 (정사각형), 16 / 9 (가로형), 4 / 5 (세로형) 
    */
    aspect-ratio: 1 / 1; 
  }

  .slider-track {
    display: flex;
    width: 100%;
    height: 100%;
    /* 초기 위치는 첫 번째 장(이미지 0번) */
    transform: translateX(-100%); 
  }

  .slide {
    min-width: 100%;
    height: 100%;
  }

  .slide img {
    width: 100%;
    height: 100%;
    display: block;
    /* [이미지 채우기 방식] cover: 꽉 채움 / contain: 전체 노출 */
    object-fit: cover; 
  }

  /* 좌우 화살표 디자인 (동그라미) */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0, 0, 0, 0.4);
    color: white;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
  }

  .nav-btn:hover {
    background-color: rgba(0, 0, 0, 0.8);
  }

  .prev-btn { left: 15px; }
  .next-btn { right: 15px; }
</style>

<div class="card-news-container">
  <div class="slider-track" id="sliderTrack">
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_06.jpg"></div>
    
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_00.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_01.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_02.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_03.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_04.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_05.jpg"></div>
    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_06.jpg"></div>

    <div class="slide"><img src="https://raw.githubusercontent.com/anguk-staion/playday/main/WP.01_00.jpg"></div>
  </div>

  <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
  <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
</div>

<script>
  const track = document.getElementById('sliderTrack');
  const slides = document.querySelectorAll('.slide');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let index = 1; // 0번 이미지(첫 장)가 처음에 보이도록 설정
  let isMoving = false;

  // 화살표 표시/숨김을 제어하는 함수
  function updateButtons() {
    // 현재 위치가 첫 장(index 1)이거나, 마지막 장에서 넘어간 가짜 첫 장(마지막 index)일 때
    if (index === 1 || index === slides.length - 1) {
      prevBtn.style.display = 'none'; // 왼쪽 화살표 숨김
    } else {
      prevBtn.style.display = 'flex'; // 왼쪽 화살표 표시
    }
  }

  // 초기 상태에서 버튼 한 번 업데이트
  updateButtons();

  function moveSlider() {
    track.style.transition = 'transform 0.4s ease-in-out';
    track.style.transform = `translateX(-${index * 100}%)`;
    updateButtons(); // 슬라이드가 넘어갈 때마다 화살표 상태 즉시 업데이트
  }

  // 슬라이드 애니메이션이 끝났을 때의 처리 (무한 루프)
  track.addEventListener('transitionend', () => {
    isMoving = false;
    
    // 가짜 0번(가장 오른쪽)에 도달하면 애니메이션 없이 진짜 0번 위치로 몰래 점프
    if (slides[index].innerHTML.includes('WP.01_00.jpg') && index === slides.length - 1) {
      track.style.transition = 'none';
      index = 1;
      track.style.transform = `translateX(-${index * 100}%)`;
    }
  });

  nextBtn.addEventListener('click', () => {
    if (isMoving) return;
    isMoving = true;
    index++;
    moveSlider();
  });

  prevBtn.addEventListener('click', () => {
    if (isMoving) return;
    isMoving = true;
    index--;
    moveSlider();
  });
</script>
